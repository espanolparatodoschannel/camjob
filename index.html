<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Foto Marcador Móvil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="min-h-screen text-slate-100 font-sans overflow-x-hidden">

    <div id="app" class="max-w-md mx-auto p-4 flex flex-col min-h-screen">

        <!-- Header simple -->
        <header class="flex justify-between items-center py-2 mb-2">
            <div>
                <h1 class="text-xl font-bold text-blue-400">Cámara Laboral</h1>
                <p class="text-xs text-slate-400">Control de Proceso</p>
            </div>
            <div class="flex gap-2">
                <button onclick="switchCamera()"
                    class="p-3 bg-slate-800 rounded-full text-lg shadow-lg btn-active">🔄</button>
            </div>
        </header>

        <!-- Selector de Ubicaciones -->
        <div class="bg-slate-800 p-4 rounded-2xl mb-4 border border-slate-700 shadow-xl">
            <div class="flex flex-col gap-3">
                <div class="relative">
                    <label class="text-[10px] uppercase font-bold text-slate-500 ml-1">📍 Selección de Área</label>
                    <select id="locationSelect"
                        class="w-full mt-1 p-4 bg-slate-700 text-white border-none rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-lg appearance-none shadow-inner font-bold">
                        <!-- Cargado por JS -->
                    </select>
                    <div class="absolute right-4 bottom-4 pointer-events-none opacity-50">▼</div>
                </div>

                <div class="flex gap-2">
                    <input type="text" id="newLocation" placeholder="Nueva etiqueta..."
                        class="flex-1 bg-slate-900 border border-slate-700 p-3 rounded-xl text-sm focus:outline-none focus:border-blue-500">
                    <button onclick="addLocation()"
                        class="bg-blue-600 px-5 rounded-xl text-sm font-bold btn-active text-white">Añadir</button>
                </div>
            </div>
        </div>

        <!-- Visor de Cámara -->
        <div id="camContainer" class="camera-view shadow-2xl border border-slate-700 mb-6 relative">
            <video id="video" autoplay playsinline></video>
            <div id="flashOverlay" class="absolute inset-0 pointer-events-none"></div>

            <!-- Guía visual del sello -->
            <div class="absolute bottom-4 left-4 pointer-events-none">
                <div class="bg-black/30 backdrop-blur-sm border border-white/10 rounded-lg p-2 flex flex-col gap-1">
                    <div class="w-16 h-2 bg-white/20 rounded-full"></div>
                </div>
            </div>
        </div>

        <!-- Botón de Disparo Principal -->
        <div class="mt-auto pb-8 flex flex-col items-center gap-2">
            <button id="captureBtn"
                class="w-24 h-24 rounded-full shadow-2xl flex items-center justify-center btn-active">
                <div class="inner-ring">
                    <div class="shutter-button"></div>
                </div>
            </button>
            <span class="text-slate-500 text-[10px] font-bold tracking-widest uppercase mt-3">Capturar Registro</span>
        </div>

        <!-- Modal de Resultado -->
        <div id="resultArea"
            class="hidden fixed inset-0 z-50 bg-slate-950/95 backdrop-blur-xl p-4 flex flex-col items-center justify-center">
            <div class="w-full max-w-sm flex flex-col">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold">Vista previa</h2>
                    <button onclick="resetCamera()" class="text-slate-400 text-3xl font-light">&times;</button>
                </div>

                <img id="photoPreview"
                    class="w-full rounded-3xl shadow-2xl border-2 border-slate-700 mb-6 object-contain max-h-[60vh]">

                <div class="grid grid-cols-2 gap-4">
                    <button onclick="sharePhoto()"
                        class="bg-green-600 text-white py-4 rounded-2xl font-bold shadow-lg btn-active flex flex-col items-center gap-1">
                        <span class="text-2xl">📤</span>
                        <span>Enviar</span>
                    </button>
                    <button onclick="resetCamera()"
                        class="bg-slate-800 text-white py-4 rounded-2xl font-bold btn-active flex flex-col items-center gap-1 border border-slate-700">
                        <span class="text-2xl">📸</span>
                        <span>Reintentar</span>
                    </button>
                </div>

                <button onclick="downloadPhoto()"
                    class="mt-6 text-slate-500 text-sm font-medium flex items-center justify-center gap-2">
                    📥 Guardar en carrete
                </button>
            </div>
        </div>

    </div>

    <!-- Elemento oculto para procesar el dibujo -->
    <canvas id="photoCanvas"></canvas>

    <script src="app.js" defer></script>
</body>

</html>
