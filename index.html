<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cámara Laboral Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="min-h-screen text-slate-100 font-sans overflow-x-hidden">

    <div id="app" class="max-w-md mx-auto p-4 flex flex-col min-h-screen">

        <!-- Header -->
        <header class="flex justify-between items-center py-2 mb-2">
            <div>
                <h1 class="text-xl font-bold text-blue-400">Cámara Laboral</h1>
                <p class="text-xs text-slate-400">Control de Registro Profesional</p>
            </div>
            <button onclick="switchCamera()"
                class="p-3 bg-slate-800 rounded-full text-lg shadow-lg btn-active">🔄</button>
        </header>

        <!-- Selector Custom (Premium) -->
        <div class="bg-slate-800 p-4 rounded-3xl mb-4 border border-slate-700 shadow-2xl">
            <label class="text-[10px] uppercase font-bold text-slate-500 ml-1">📍 Localización actual</label>
            <div id="selectorTrigger" onclick="openSelector()"
                class="w-full mt-2 p-4 bg-slate-900 border border-slate-700 rounded-2xl flex items-center justify-between cursor-pointer btn-active">
                <div class="flex items-center gap-3">
                    <div id="selectedColorDot" class="w-4 h-4 rounded-full dot-gray"></div>
                    <span id="selectedLabel" class="font-bold text-lg">Cargando...</span>
                </div>
                <div class="text-slate-500">▼</div>
            </div>
        </div>

        <!-- Visor de Cámara -->
        <div id="camContainer" class="camera-view shadow-2xl border border-slate-700 mb-6 relative">
            <video id="video" autoplay playsinline></video>
            <div id="flashOverlay" class="absolute inset-0 pointer-events-none"></div>

            <!-- Guía visual del sello (Simulación) -->
            <div class="absolute bottom-4 left-4 pointer-events-none opacity-50">
                <div class="bg-black/30 backdrop-blur-sm rounded-lg p-2 flex items-center gap-2">
                    <div id="previewDot" class="w-3 h-3 rounded-full dot-gray"></div>
                    <div class="w-20 h-2 bg-white/20 rounded-full"></div>
                </div>
            </div>
        </div>

        <!-- Botón de Captura Rediseñado -->
        <div class="mt-auto pb-8 flex flex-col items-center gap-4">
            <button id="captureBtn"
                class="w-24 h-24 rounded-full shadow-2xl flex items-center justify-center btn-active">
                <div class="inner-ring">
                    <div class="shutter-button"></div>
                </div>
            </button>
            <span class="text-slate-500 text-[10px] font-bold tracking-widest uppercase">Generar Registro Social</span>
        </div>

        <!-- Modal de Resultado -->
        <div id="resultArea"
            class="hidden fixed inset-0 z-[100] bg-slate-950/98 backdrop-blur-xl p-4 flex flex-col items-center justify-center">
            <div class="w-full max-w-sm">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold">Registro Capturado</h2>
                    <button onclick="resetCamera()" class="text-slate-400 text-3xl font-light">&times;</button>
                </div>

                <img id="photoPreview"
                    class="w-full rounded-2xl shadow-2xl border-2 border-slate-700 mb-6 object-contain max-h-[55vh]">

                <div class="grid grid-cols-2 gap-4">
                    <button onclick="sharePhoto()"
                        class="bg-green-600 text-white py-4 rounded-2xl font-bold shadow-lg btn-active flex flex-col items-center gap-1">
                        <span class="text-2xl">📤</span>
                        <span>Compartir</span>
                    </button>
                    <button onclick="resetCamera()"
                        class="bg-slate-800 text-white py-4 rounded-2xl font-bold btn-active flex flex-col items-center gap-1 border border-slate-700">
                        <span class="text-2xl">📸</span>
                        <span>Repetir</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Panel de Selección (Bottom Sheet) -->
        <div id="selectorPanel" class="fixed inset-0 z-[200] hidden">
            <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeSelector()"></div>
            <div id="sheetContent" class="absolute bottom-0 left-0 right-0 bg-slate-900 rounded-t-[2.5rem] max-h-[85vh] overflow-hidden flex flex-col shadow-2xl transform translate-y-full transition-transform duration-300">
                <div class="w-12 h-1.5 bg-slate-700 rounded-full mx-auto my-4"></div>
                
                <div class="p-4 border-b border-slate-800 flex justify-between items-center">
                    <h3 class="text-xl font-bold">Seleccionar Ubicación</h3>
                    <button onclick="closeSelector()" class="bg-slate-800 p-2 rounded-full">✕</button>
                </div>

                <div class="flex-1 overflow-y-auto p-4" id="groupsList">
                    <!-- Dinámico -->
                </div>

                <div class="p-6 bg-slate-950 border-t border-slate-800">
                    <div class="flex gap-2">
                        <input type="text" id="newLocation" placeholder="Nueva etiqueta rápida..."
                            class="flex-1 bg-slate-900 border border-slate-700 p-4 rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <button onclick="addLocation()"
                            class="bg-blue-600 p-4 rounded-2xl font-bold btn-active">Añadir</button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Elemento oculto para procesar el dibujo -->
    <canvas id="photoCanvas"></canvas>

    <script src="app.js" defer></script>
</body>

</html>
